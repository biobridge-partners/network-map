<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biobridge Network Map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='50' font-size='80' text-anchor='middle' dominant-baseline='central'>&#x1F680;</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>

/* - Login overlay - */
#login-overlay{position:fixed;inset:0;background:#f0f2f8;
  display:flex;align-items:center;justify-content:center;z-index:99999}
#login-overlay.hidden{display:none}
.login-card{background:#fff;border-radius:14px;padding:32px 36px 28px;
  box-shadow:0 4px 32px rgba(35,53,66,.12);width:320px}

.login-card label{display:block;font-size:.72rem;font-weight:600;color:#4B5563;
  text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.login-card input{width:100%;border:1.5px solid #D0D5DD;border-radius:8px;
  padding:9px 12px;font-size:.88rem;font-family:inherit;color:#233542;outline:none;
  transition:border-color .15s;margin-bottom:14px;box-sizing:border-box}
.login-card input:focus{border-color:#5F86A6}
.login-btn{width:100%;background:#233542;color:#fff;border:none;border-radius:8px;
  padding:11px;font-size:.88rem;font-weight:600;cursor:pointer;
  font-family:inherit;transition:background .15s;margin-top:4px}
.login-btn:hover{background:#3a4f60}
.login-err{color:#A13A4A;font-size:.75rem;margin-top:10px;
  display:none;text-align:center;font-weight:500}
.login-err.show{display:block}
/* map-container always in DOM so SVG dimensions initialise correctly */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Biobridge brand palette */
  --text1:#FFFFFF; --text2:#233542;
  --bg1:#233542;   --bg2:#FFFFFF;
  --a1:#5F86A6;    --a2:#3B817B; --a3:#CFA248; --a4:#C8742C; --a5:#A13A4A; --a6:#7B6FA3;
  --s1:#DEE6ED;    --s2:#D2EAE8; --s3:#F5ECDA; --s4:#F5E3D3; --s5:#EFD4D8; --s6:#E4E2EC;
  --shade:#F2F2F2; --border:#E0E0E0; --muted:#6B7280; --soft:#4B5563;
  /* Semantic */
  --trusted:var(--a3);  /* #CFA248 amber */
  --warm:var(--a2);     /* #3B817B teal  */
  --cold:#7F7F7F;       /* neutral grey  */
  --cloud-fill:#DEE6ED; /* s1 */
  --cloud-pri-fill:#F5ECDA; /* s3 */
  --bb-light:#E8EEF2;
}
html,body{width:100%;height:100%;background:var(--shade);color:var(--text2);
  font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;font-size:13px}

/* - Toolbar - */
#toolbar{position:fixed;top:0;left:0;right:0;height:50px;background:var(--bg2);
  border-bottom:1.5px solid var(--border);display:flex;align-items:center;
  z-index:300;box-shadow:0 1px 4px rgba(0,0,0,.06)}
#tb-brand{display:flex;align-items:center;gap:8px;padding:0 14px;
  border-right:1.5px solid var(--border);height:100%;flex-shrink:0}
#tb-brand h1{font-size:.88rem;font-weight:700;white-space:nowrap}

#tb-filters{display:flex;align-items:center;flex:1;overflow-x:auto;height:100%}
.tb-sec{display:flex;align-items:center;gap:7px;padding:0 12px;
  border-right:1px solid var(--border);height:100%;flex-shrink:0}
.tb-lbl{font-size:.62rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}

/* Score chips */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
  border-radius:14px;font-size:.72rem;font-weight:600;cursor:pointer;
  border:1.5px solid var(--border);background:var(--shade);color:var(--soft);
  transition:all .15s;user-select:none;white-space:nowrap}
.chip:hover{border-color:var(--a1);color:var(--text2)}
.chip-trusted{background:#fdf3e0;border-color:var(--a3);color:#7a5a10}
.chip-warm{background:#d8eeed;border-color:var(--a2);color:#1a4e4a}
.chip-cold{background:#eee;border-color:#999;color:#444}

/* Search */
#search-wrap{position:relative;display:flex;align-items:center}
#search{width:190px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:7px;color:var(--text2);font-size:.72rem;padding:4px 26px 4px 9px;
  font-family:inherit;outline:none;transition:border-color .15s}
#search:focus{border-color:var(--a1)}
#search-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  cursor:pointer;color:var(--muted);background:var(--shade);
  border:1px solid var(--border);border-radius:50%;
  width:15px;height:15px;min-width:15px;min-height:15px;
  padding:0;display:none;align-items:center;justify-content:center;
  line-height:0;font-style:normal}
#search-clear.show{display:flex}
#search-clear:hover{background:var(--border);color:var(--text2)}

/* Stats */
#stats-bar{margin-left:auto;padding:0 14px;font-size:.68rem;color:var(--muted);
  white-space:nowrap;flex-shrink:0}

/* - Popover dropdowns - */
.pop{position:relative}
.pop-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;
  font-size:.72rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border);
  background:var(--bg2);color:var(--soft);white-space:nowrap;user-select:none;transition:all .15s}
.pop-btn:hover,.pop-btn.open{border-color:var(--a1);color:var(--text2);background:var(--shade)}
.pop-menu{position:fixed;top:0;left:0;background:var(--bg2);
  border:1.5px solid var(--border);border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:10000;min-width:210px;display:none;
  flex-direction:column}
.pop-menu.open{display:flex}
.pop-menu-body{padding:8px 10px;max-height:250px;overflow-y:auto}
.pop-menu-footer{padding:8px 10px;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;gap:6px;flex-shrink:0}
.pop-footer-btn{padding:4px 14px;border-radius:5px;font-size:.72rem;cursor:pointer;
  font-family:inherit;transition:all .15s}
.pop-cancel{border:1px solid var(--border);background:var(--bg2);color:var(--muted)}
.pop-cancel:hover{background:var(--shade)}
.pop-ok{border:none;background:var(--a1);color:#fff;font-weight:600}
.pop-ok:hover{background:var(--bg1)}

.cb-row{display:flex;align-items:center;gap:7px;cursor:pointer;padding:3px 4px;
  border-radius:4px;font-size:.76rem;white-space:nowrap;user-select:none}
.cb-row:hover{background:var(--shade)}
.cb-row input{cursor:pointer;accent-color:var(--a1);flex-shrink:0}
.cb-select-all{font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);
  margin-bottom:4px;padding-bottom:6px}

/* - Canvas - */
#canvas{position:fixed;top:50px;left:0;right:0;bottom:0}
svg{width:100%;height:100%}

/* - Legend - */
#legend{position:fixed;bottom:16px;left:14px;background:var(--bg2);
  border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;
  z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.leg-title{font-size:.6rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:var(--muted);margin-bottom:6px}
.leg-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;
  font-size:.71rem;color:var(--soft)}
.leg-row:last-child{margin-bottom:0}
.leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.leg-cloud{width:14px;height:9px;border-radius:5px;background:#DEE6ED;flex-shrink:0}
.leg-cloud-pri{width:14px;height:9px;border-radius:5px;background:var(--cloud-pri-fill);flex-shrink:0}

/* - Side panel - */
#panel{position:fixed;top:50px;right:0;width:300px;height:calc(100vh - 50px);
  background:var(--bg2);border-left:1.5px solid var(--border);
  transform:translateX(100%);transition:transform .25s ease;
  overflow-y:auto;z-index:200;padding:16px}
#panel.open{transform:translateX(0)}
#panel-close{position:absolute;top:11px;right:11px;background:var(--shade);
  border:1px solid var(--border);color:var(--muted);cursor:pointer;
  border-radius:50%;width:22px;height:22px;min-width:22px;min-height:22px;
  display:flex;align-items:center;justify-content:center;
  padding:0;font-size:10px;font-weight:700;line-height:0}
#panel-close:hover{background:var(--border);color:var(--text2)}
.p-name{font-size:.98rem;font-weight:700;color:var(--text2);margin-bottom:2px;
  padding-right:28px;line-height:1.3}
.p-sub{font-size:.75rem;color:var(--muted);margin-bottom:8px;line-height:1.5}
.p-tag{display:inline-flex;align-items:center;gap:4px;background:var(--shade);
  border-radius:5px;padding:3px 8px;font-size:.7rem;color:var(--soft);
  margin-bottom:10px;border:1px solid var(--border);cursor:pointer}
.p-tag:hover{background:var(--s1);border-color:var(--a1)}
.p-sec{font-size:.62rem;text-transform:uppercase;letter-spacing:.06em;
  color:var(--muted);margin:11px 0 5px;font-weight:700}
.s-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:.76rem}
.s-badge{padding:3px 9px;border-radius:4px;font-size:.68rem;font-weight:700}
.sb-Trusted{background:#fdf3e0;color:#7a5a10}
.sb-Warm{background:#d8eeed;color:#1a4e4a}
.sb-Cold{background:#eee;color:#444}
.sb-Senior{background:var(--s1);color:var(--bg1)}
.sb-Mid{background:var(--shade);color:var(--soft)}
.sb-Junior{background:var(--shade);color:var(--muted);font-weight:400}
.sb-Unknown{background:var(--shade);color:var(--muted);font-weight:400}
.p-link{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:.78rem;font-weight:600;
  color:#0077B5;text-decoration:none;background:#e8f4fb;padding:6px 12px;
  border-radius:6px;border:1.5px solid #b3d9ef}
.p-link:hover{background:#d0eaf7;text-decoration:none}
.p-date-val{font-size:.82rem;color:var(--text2);margin-top:2px;font-weight:500}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:4px}
.stat-box{background:var(--shade);border-radius:7px;padding:9px 11px;border:1px solid var(--border)}
.stat-n{font-size:1.3rem;font-weight:700;color:var(--text2)}
.stat-l{font-size:.63rem;color:var(--muted);margin-top:1px}
.co-row{display:flex;align-items:center;gap:7px;padding:5px 0;
  border-bottom:1px solid var(--border);font-size:.75rem;cursor:pointer}
.co-row:hover{background:var(--shade);margin:0 -4px;padding:5px 4px;border-radius:4px}
.co-row:last-child{border-bottom:none}
.co-name{flex:1;color:var(--text2);font-weight:500}
.co-ct{font-size:.67rem;color:var(--muted)}
/* Bar chart for top companies */
.bar-row{margin-bottom:7px}
.bar-label{display:flex;justify-content:space-between;font-size:.72rem;
  color:var(--text2);margin-bottom:2px}
.bar-track{background:var(--shade);border-radius:3px;height:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--a1);transition:width .4s}
/* Canvas donut */
#contrib-donut{display:block;margin:8px auto 0}
.donut-legend{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.donut-leg-row{display:flex;align-items:center;gap:7px;font-size:.74rem}
.donut-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>


<div id="login-overlay">
  <div class="login-card">
    <form id="login-form" autocomplete="on" onsubmit="return false">
      <label for="l-email">Email</label>
      <input type="email" id="l-email" name="email" autocomplete="email"
        placeholder="you@biobridgepartners.com" required>
      <label for="l-pw">Password</label>
      <input type="password" id="l-pw" name="password"
        autocomplete="current-password" placeholder="••••••••" required>
      <button type="button" class="login-btn" onclick="doLogin()">Sign in</button>
      <div class="login-err" id="login-err">Incorrect email or password</div>
    </form>
  </div>
</div>
<div id="map-container">

<div id="toolbar">
  <div id="tb-brand">
    <h1><span style="color:#233542">Biobridge</span> <span style="color:#5F86A6">Network Map</span></h1>
  </div>
  <div id="tb-filters">

    <!-- Contributors -->
    <div class="tb-sec">
      <span class="tb-lbl">Contributors</span>
      <div class="pop" id="pop-contrib"><div class="pop-btn" id="pop-contrib-btn"><span id="contrib-lbl">All</span> ▾</div></div>
    </div>

    <!-- Score chips -->
    <div class="tb-sec" style="gap:5px">
      <span class="tb-lbl">Strength</span>
      <div class="chip" id="chip-Trusted" onclick="toggleScore('Trusted')">⭐ Trusted</div>
      <div class="chip" id="chip-Warm"    onclick="toggleScore('Warm')">🤝 Warm</div>
      <div class="chip" id="chip-Cold"    onclick="toggleScore('Cold')">👋 Cold</div>
    </div>

    <!-- Seniority -->
    <div class="tb-sec">
      <span class="tb-lbl">Seniority</span>
      <div class="pop" id="pop-sen"><div class="pop-btn" id="pop-sen-btn"><span id="sen-lbl">All</span> ▾</div></div>
    </div>

    <!-- Priority -->
    <div class="tb-sec">
      <span class="tb-lbl">Priority</span>
      <div class="pop" id="pop-pri"><div class="pop-btn" id="pop-pri-btn"><span id="pri-lbl">All accounts</span> ▾</div></div>
    </div>

    <!-- Search -->
    <div class="tb-sec">
      <div id="search-wrap">
        <input type="text" id="search" placeholder="Search name or company…">
        <button id="search-clear" title="Clear search" aria-label="Clear" style="font-size:9px;font-weight:700">×</button>
      </div>
    </div>

    <div id="stats-bar"></div>
  </div>
</div>

<!-- Dropdown menus rendered at body level to avoid toolbar clipping -->
<div class="pop-menu" id="pop-contrib-menu">
  <div class="pop-menu-body" id="contrib-cb"></div>
  <div class="pop-menu-footer">
    <button class="pop-footer-btn pop-cancel" onclick="cancelPop('contrib')">Cancel</button>
    <button class="pop-footer-btn pop-ok" onclick="commitPop('contrib')">OK</button>
  </div>
</div>
<div class="pop-menu" id="pop-sen-menu">
  <div class="pop-menu-body" id="sen-cb"></div>
  <div class="pop-menu-footer">
    <button class="pop-footer-btn pop-cancel" onclick="cancelPop('sen')">Cancel</button>
    <button class="pop-footer-btn pop-ok" onclick="commitPop('sen')">OK</button>
  </div>
</div>
<div class="pop-menu" id="pop-pri-menu">
  <div class="pop-menu-body" id="pri-cb"></div>
  <div class="pop-menu-footer">
    <button class="pop-footer-btn pop-cancel" onclick="cancelPop('pri')">Cancel</button>
    <button class="pop-footer-btn pop-ok" onclick="commitPop('pri')">OK</button>
  </div>
</div>

<div id="canvas"><svg id="svg"></svg></div>

<div id="legend">
  <div class="leg-title">Relationship strength</div>
  <div class="leg-row"><div class="leg-dot" style="background:#CFA248"></div>Trusted</div>
  <div class="leg-row"><div class="leg-dot" style="background:#3B817B"></div>Warm</div>
  <div class="leg-row"><div class="leg-dot" style="background:#7F7F7F"></div>Cold</div>
  <div class="leg-title" style="margin-top:8px">Companies</div>
  <div class="leg-row"><div class="leg-cloud"></div>Standard</div>
  <div class="leg-row"><div class="leg-cloud-pri"></div>Priority account</div>
</div>

<div id="panel">
  <button id="panel-close" title="Close" aria-label="Close">×</button>
  <div id="panel-content"></div>
</div>

// - Contact visibility -
function isVisible(c){
  if(!fScores.has(c.max_score)) return false;
  if(!fSen.has(c.seniority)) return false;
  if(![...fContribs].some(k=>c.contributors[k])) return false;
  // Priority filter - fully additive:
  // __all__ = no filter applied (show everyone)
  // specific priority company names = show only contacts at those companies
  // __other__ = show contacts at NON-priority companies
  // combinations are OR within the priority filter, AND with all other filters
  // Priority filter: if nothing selected → show nothing for this dimension
  // "Show all" state = all priority companies checked + __other__ checked
  {
    const selectedPriNames=[...fPri].filter(p=>p!=="__other__");
    const wantsOther=fPri.has("__other__");
    // If filter is in full "show all" state, skip entirely
    const allPriSelected=RAW.priority_companies.every(p=>fPri.has(p));
    if(!(allPriSelected && wantsOther)){
      // Filter is active — apply it
      const matchesNamedPri=selectedPriNames.some(p=>c.company===p);
      const matchesOther=!c.is_priority && wantsOther;
      if(!matchesNamedPri && !matchesOther) return false;
    }
  }
  if(fSearch){
    const t=fSearch.toLowerCase();
    if(!(c.label.toLowerCase().includes(t)||c.company.toLowerCase().includes(t)||
         c.position.toLowerCase().includes(t))) return false;
  }
  return true;
}

function buildCBList(bodyId, items, pendingSet, selectAllLabel){
  const body = document.getElementById(bodyId);

  allRow.className="cb-row cb-select-all";
  const allInp = document.createElement("input");
  allInp.type="checkbox"; allInp.dataset.role="selectall";
  allInp.checked = items.every(i=>pendingSet.has(i));
  allInp.addEventListener("change", e=>{
    if(e.target.checked) items.forEach(i=>pendingSet.add(i));
    else items.forEach(i=>pendingSet.delete(i));
    syncCheckboxes(body, items, pendingSet);
  });
  allRow.appendChild(allInp);
  allRow.appendChild(document.createTextNode(" (Select All)"));
  body.appendChild(allRow);

  items.forEach(item=>{
    const row=document.createElement("label");
    row.className="cb-row";
    const inp=document.createElement("input");
    inp.type="checkbox"; inp.dataset.item=item;
    inp.checked=pendingSet.has(item);
    inp.addEventListener("change",e=>{
      if(e.target.checked) pendingSet.add(item);
      else pendingSet.delete(item);
      syncSelectAll(body, items, pendingSet);
    });
    row.appendChild(inp);
    row.appendChild(document.createTextNode(" "+item));
    body.appendChild(row);
  });
}

}

// Cloud radius is computed AFTER contact placement to tightly fit the dots.
// This stub is used during layoutCompanies for initial distance estimation only.
function cloudRadiusEstimate(n){
  // Rough estimate for first-pass placement only.
  // Real radius is computed by layoutContacts after dot placement.
  if(n<=0) return 0;
  if(n===1) return NODE_R+16;  // compact: dot + label
  const area=n*Math.PI*NODE_R*NODE_R/0.7;
  return Math.min(110, Math.max(NODE_R+16, Math.sqrt(area/Math.PI)+NODE_R+4));
}

const SECTOR=Math.PI/4;
const CLUSTER_ANGLES=(()=>{
  const S=SECTOR;
  return {
    0: -S*0.5,   // ~337°  Global Pharma       top-right
    1:  S*0.5,   // ~45°   Nordic/Danish Pharma right
    2:  S*1.5,   // ~135°  Biotech             bottom-right
    3:  S*2.5,   // ~225°  CRO/MedTech/Health  bottom
    4:  S*3.5,   // ~315°  Foundation/Academia  left
    5: -S*2.5,   // ~225°  Investor/VC          left
    6: -S*1.5,   // ~135°  Consulting           top-left
    7:  0,       // ~0°    Other
  };
})();

function packCompanies(coList, finalR){
  // Compact radial packing: score drives distance (more contacts = closer),
  // archetype provides a soft angular bias for neighbourhood feel.
  // No hard sector enforcement — clouds pack as tightly as possible.
  const cx=CX(), cy=CY();
  const PADDING=16, BB_CLEAR=BB_R+PADDING+6;
  const placed=[];
  const out={};
  const maxScore=coList[0]?.score||1;

  coList.forEach((co,rankIdx)=>{
    const r=finalR ? (finalR[co.name]||co.r) : co.r;
    const base=CLUSTER_ANGLES[co.cluster]??0;
    // Score-based minimum distance: high-score companies can be placed closer
    const scoreFrac=co.score/maxScore;  // 1=highest, 0=lowest
    const minDist=BB_CLEAR+r;
    // Target starting radius based on score
    const targetR=minDist + (1-Math.pow(scoreFrac,0.5))*200;
    let pos=null;

    // Spiral search: start at targetR, sweep widely, expand quickly.
    // High-score companies: tight sweep near base → compact cluster.
    // Low-score companies: wide sweep from the start → fill gaps anywhere nearby.
    const sweepStep = 0.15 + (1-scoreFrac)*0.25;  // outer companies sweep faster
    const expandStep = 4  + (1-scoreFrac)*10;       // outer companies expand faster

    for(let attempt=0; attempt<2000 && !pos; attempt++){
      const trialR=Math.max(minDist, targetR) + Math.floor(attempt/20)*expandStep;
      const side=(attempt%2===0?1:-1);
      const sweep=Math.floor(attempt/2)*sweepStep;
      const angle=base + side*sweep;
      const tx=cx+Math.cos(angle)*trialR;
      const ty=cy+Math.sin(angle)*trialR;
      if(Math.sqrt((tx-cx)**2+(ty-cy)**2)<BB_CLEAR+r) continue;
      if(!placed.some(p=>Math.sqrt((tx-p.x)**2+(ty-p.y)**2)<p.r+r+PADDING)){
        pos={x:tx,y:ty};
      }
    }
    if(!pos){
      // Exhaustive fallback: any angle at increasing radii
      outer: for(let rr=minDist; rr<minDist+800; rr+=8){
        for(let a=0; a<Math.PI*2; a+=0.08){
          const tx=cx+Math.cos(base+a)*rr, ty=cy+Math.sin(base+a)*rr;
          if(!placed.some(p=>Math.sqrt((tx-p.x)**2+(ty-p.y)**2)<p.r+r+PADDING)){
            pos={x:tx,y:ty}; break outer;
          }
        }
      }
      if(!pos) pos={x:cx+Math.cos(base)*minDist, y:cy+Math.sin(base)*minDist};
    }
    out[co.name]={...pos, r, count:co.cnt};
    placed.push({x:pos.x,y:pos.y,r});
  });
  return out;
}

function layoutCompanies(visContacts){
  const visCos=new Map();
  visContacts.forEach(c=>{
    if(!visCos.has(c.company)) visCos.set(c.company,{cnt:0,maxImp:0});
    const e=visCos.get(c.company);
    e.cnt++; e.maxImp=Math.max(e.maxImp,importance(c));
  });
  const coMeta=Object.fromEntries(RAW.companies.map(c=>[c.name,c]));
  const coList=[...visCos.entries()].map(([name,{cnt,maxImp}])=>({
    name, cnt, maxImp,
    cluster:coMeta[name]?.cluster??7,
    r:cloudRadiusEstimate(cnt),
    score:Math.log(cnt+1)*3+maxImp*0.5,
  })).sort((a,b)=>b.score-a.score);
  if(!coList.length){compPos={}; return;}
  // First pass with estimated radii
  compPos=packCompanies(coList, null);
}

// Estimate px width of a text string at a given font size (rough)
function estimateTextWidth(text, fontSize){
  return text.length * fontSize * 0.58;
}

// Word-wrap a company name into lines.
// Max line width 80px, max 3 lines. Truncates with … if needed.
// Never breaks mid-word.
function wrapCompanyName(name, fontSize){
  const MAX_W = 80;
  const MAX_LINES = 3;
  const words = name.split(' ');
  const lines = [];
  let cur = '';
  for(const w of words){
    const test = cur ? cur+' '+w : w;
    if(estimateTextWidth(test, fontSize) <= MAX_W){
      cur = test;
    } else {
      if(cur) lines.push(cur);
      cur = w;
    }
  }
  if(cur) lines.push(cur);
  const result = lines.length ? lines : [name];
  // Cap at MAX_LINES, truncate last line with … if needed
  if(result.length > MAX_LINES){
    const truncated = result.slice(0, MAX_LINES);
    // Add … to last kept line if there were more words
    truncated[MAX_LINES-1] = truncated[MAX_LINES-1].replace(/\s*$/, '') + '…';
    return truncated;
  }
  return result;
}

function layoutContacts(visContacts){
  const byCompany={};
  visContacts.forEach(c=>{
    if(!byCompany[c.company]) byCompany[c.company]=[];
    byCompany[c.company].push(c);
  });
  contPos={};
  const finalR={};

  Object.entries(byCompany).forEach(([company,contacts])=>{
    const cp=compPos[company]; if(!cp) return;
    const n=contacts.length;
    const sorted=[...contacts].sort((a,b)=>importance(b)-importance(a));

    // Label: word-wrapped, font 8px. Reserve zone for all lines.
    const labelFontSize=8;
    const labelLines=wrapCompanyName(company, labelFontSize);
    const labelMaxW=Math.max(...labelLines.map(l=>estimateTextWidth(l,labelFontSize)));
    const labelTotalH=labelLines.length*(labelFontSize+2);
    // Label zone radius: half-diagonal of the text bounding box + padding
    const labelZoneR=Math.sqrt((labelMaxW/2)**2+(labelTotalH/2)**2)+4;

    if(n===0){ finalR[company]=labelZoneR+4; return; }

    if(n===1){
      // Single contact: dot centred, cloud sized to just fit dot + label below.
      // labelZoneR reserved ONLY for the label height, not a full circle.
      // Cloud height = NODE_R (dot above centre) + gap + labelTotalH + NODE_R padding
      const dotY = cp.y - labelTotalH/2 - 4;  // dot sits above the label
      contPos[sorted[0].uid]={x:cp.x, y:dotY};
      // Cloud radius: half the diagonal of [dot + gap + label block]
      const totalH = NODE_R*2 + 4 + labelTotalH;
      const totalW = Math.max(labelMaxW, NODE_R*2) + 6;
      finalR[company] = Math.sqrt((totalW/2)**2 + (totalH/2)**2) + 4;
      return;
    }

    // Pack dots tightly around the label zone using sunflower/golden angle.
    // Start immediately outside labelZoneR — no extra gap.
    // Importance modulates radius softly: most important = closest.
    const positions=[];
    sorted.forEach((c,i)=>{
      // Map rank to a normalised radius: inner dots first
      const t=n>1 ? i/(n-1) : 0;
      // Base ring: just outside label zone. Grow outward as needed.
      const radius=labelZoneR + NODE_R + 2 + t*(Math.sqrt(n)*NODE_R*1.4);
      const theta=i*GOLDEN;
      positions.push({uid:c.uid, x:cp.x+radius*Math.cos(theta), y:cp.y+radius*Math.sin(theta)});
    });

    // Iterative repulsion — prevent dot-on-dot overlap
    const MIN_SEP=NODE_R*2+2.5;
    for(let iter=0;iter<120;iter++){
      let moved=false;
      for(let i=0;i<positions.length;i++){
        // Also push dots away from the label zone centre
        const dx0=positions[i].x-cp.x, dy0=positions[i].y-cp.y;
        const d0=Math.sqrt(dx0*dx0+dy0*dy0)||0.001;
        if(d0<labelZoneR+NODE_R){
          const push=labelZoneR+NODE_R-d0+1;
          positions[i].x+=dx0/d0*push; positions[i].y+=dy0/d0*push;
          moved=true;
        }
        for(let j=i+1;j<positions.length;j++){
          const dx=positions[j].x-positions[i].x;
          const dy=positions[j].y-positions[i].y;
          const d=Math.sqrt(dx*dx+dy*dy)||0.001;
          if(d<MIN_SEP){
            const push=(MIN_SEP-d)/2+0.5;
            const nx=dx/d, ny=dy/d;
            positions[i].x-=nx*push; positions[i].y-=ny*push;
            positions[j].x+=nx*push; positions[j].y+=ny*push;
            moved=true;
          }
        }
      }
      if(!moved) break;
    }

    // Re-centre cluster on company centre
    const mx=positions.reduce((s,p)=>s+p.x,0)/n;
    const my=positions.reduce((s,p)=>s+p.y,0)/n;
    positions.forEach(p=>{p.x+=cp.x-mx; p.y+=cp.y-my;});
    positions.forEach(p=>{contPos[p.uid]={x:p.x,y:p.y};});

    // Tight bounding radius: max of label zone and outermost dot
    const maxDot=positions.reduce((m,p)=>
      Math.max(m,Math.sqrt((p.x-cp.x)**2+(p.y-cp.y)**2)),0);
    finalR[company]=Math.max(labelZoneR+2, maxDot+NODE_R+5);
  });

  // Re-pack companies with final tight radii
  const coMeta=Object.fromEntries(RAW.companies.map(c=>[c.name,c]));
  const coList=Object.entries(compPos).map(([name,cp])=>({
    name, cnt:cp.count,
    cluster:coMeta[name]?.cluster??7,
    r:finalR[name]??cp.r,
    score:Math.log((cp.count||1)+1)*3,
  })).sort((a,b)=>b.score-a.score);

  const newPos=packCompanies(coList, finalR);
  Object.entries(newPos).forEach(([name,np])=>{
    const op=compPos[name]; if(!op) return;
    const dx=np.x-op.x, dy=np.y-op.y;
    const myContacts=visContacts.filter(c=>c.company===name);
    myContacts.forEach(c=>{
      if(contPos[c.uid]){ contPos[c.uid].x+=dx; contPos[c.uid].y+=dy; }
    });
  });
  compPos=newPos;
}

function drawDonut(s){
  const canvas=document.getElementById("contrib-donut");
  if(!canvas) return;
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const sz=180;
  canvas.width=sz*dpr; canvas.height=sz*dpr;
  canvas.style.width=sz+"px"; canvas.style.height=sz+"px";
  ctx.scale(dpr,dpr);
  const cx=sz/2,cy=sz/2,r=72,inner=44;
  const total=s.trusted+s.warm+s.cold||1;
  const segs=[
    {label:"Trusted",n:s.trusted,c:"#CFA248"},
    {label:"Warm",   n:s.warm,   c:"#3B817B"},
    {label:"Cold",   n:s.cold,   c:"#7F7F7F"},
  ].filter(x=>x.n>0);
  let start=-Math.PI/2;
  const gap=0.02;
  ctx.clearRect(0,0,sz,sz);
  segs.forEach(seg=>{
    const sweep=(seg.n/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start+gap/2,start+sweep-gap/2);
    ctx.closePath();
    ctx.fillStyle=seg.c; ctx.fill();
    start+=sweep;
  });
  // Hole
  ctx.save(); ctx.globalCompositeOperation="destination-out";
  ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Centre
  ctx.fillStyle="#233542"; ctx.font=`bold 18px 'Segoe UI',sans-serif`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(total,cx,cy-6);
  ctx.fillStyle="#6B7280"; ctx.font=`10px 'Segoe UI',sans-serif`;
  ctx.fillText("total",cx,cy+10);

  // Legend below
  const leg=document.getElementById("donut-legend");
  if(leg){
    leg.innerHTML=segs.map(seg=>{
      const pct=Math.round((seg.n/total)*100);
      return `<div class="donut-leg-row">
        <div class="donut-dot" style="background:${seg.c}"></div>
        <span style="flex:1;color:#233542">${seg.label}</span>
        <span style="font-weight:700;color:#233542">${seg.n}</span>
        <span style="color:#6B7280;margin-left:5px">${pct}%</span>
      </div>`;
    }).join("");
  }
}

async function sha256hex(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
